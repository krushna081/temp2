<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Timepieces - Premium Watch Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .product-info {
            padding: 25px;
        }

        .product-info h3 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .product-info p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .price {
            font-size: 1.8rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .add-to-cart {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .add-to-cart:hover {
            opacity: 0.9;
        }

        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cart-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 15px;
            margin-top: 20px;
            border-top: 2px solid #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .empty-cart {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.2rem;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .qty-btn:hover {
            background: #764ba2;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .remove-btn:hover {
            background: #ee5a6f;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Luxury Timepieces</h1>
            <p>Discover our exclusive collection of premium watches</p>
        </header>

        <div class="products-grid" id="productsGrid"></div>

        <div class="cart-section">
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="display: none;">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="totalAmount">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: "Classic Elegance",
                description: "Timeless design with Swiss precision movement",
                price: 1299.99,
                image: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=500&h=500&fit=crop"
            },
            {
                id: 2,
                name: "Sport Master",
                description: "Durable and water-resistant for active lifestyles",
                price: 899.99,
                image: "https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500&h=500&fit=crop"
            },
            {
                id: 3,
                name: "Royal Diamond",
                description: "Luxury timepiece with genuine diamonds",
                price: 2499.99,
                image: "https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd?w=500&h=500&fit=crop"
            },
            {
                id: 4,
                name: "Modern Minimalist",
                description: "Sleek contemporary design for the modern professional",
                price: 749.99,
                image: "https://images.unsplash.com/photo-1524805444758-089113d48a6d?w=500&h=500&fit=crop"
            },
            {
                id: 5,
                name: "Vintage Heritage",
                description: "Retro-inspired design with modern engineering",
                price: 1599.99,
                image: "https://images.unsplash.com/photo-1533139502658-0198f920d8e8?w=500&h=500&fit=crop"
            },
            {
                id: 6,
                name: "Chronograph Pro",
                description: "Multi-function chronograph with precision timing",
                price: 1899.99,
                image: "https://images.unsplash.com/photo-1587836374184-4ccb0b8f6adc?w=500&h=500&fit=crop"
            }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="price">$${product.price.toFixed(2)}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                cartItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            renderCart();
        }

        function updateQuantity(productId, change) {
            const cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.quantity += change;
                if (cartItem.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    renderCart();
                }
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const totalAmount = document.getElementById('totalAmount');

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                cartTotal.style.display = 'none';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong>
                        <div style="color: #666; font-size: 0.9rem;">$${item.price.toFixed(2)} each</div>
                    </div>
                    <div class="item-controls">
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span style="margin: 0 10px; font-weight: bold;">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            totalAmount.textContent = `$${total.toFixed(2)}`;
            cartTotal.style.display = 'block';
        }

        renderProducts();
        renderCart();
    </script>
</body>
</html>
